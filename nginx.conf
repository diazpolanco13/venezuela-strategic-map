# SPA estática (Vite) — Dokploy / dominio en puerto 80
server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;
    gzip on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Liveness para orquestadores (opcional)
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    # GeoJSON: pre-comprimidos (.gz) si existen, cache moderado
    location ^~ /geo/ {
        gzip_static on;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # Assets con hash (Vite): cache largo
    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
